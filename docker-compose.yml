version: '3.8'

services:
  miao-code:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: miao-code
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CACHE_DIR=/app/.cache
    volumes:
      - miao-code-cache:/app/.cache
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  miao-code-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: miao-code-dev
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "5000:5000" # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DEBUG_PORT=5000
      - VITE_API_BASE_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  miao-code-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: miao-code-test
    environment:
      - NODE_ENV=test
      - JEST_JUNIT_OUTPUT_DIR=/app/coverage
    volumes:
      - ./coverage:/app/coverage
    command: npm test -- --coverage --watchAll=false

volumes:
  miao-code-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/miao-code/cache